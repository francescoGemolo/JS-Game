<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="A fast-paced jumping game where you dodge obstacles, collect points, and survive as long as you can. How high can you score?">
    <meta name="author" content="Daniele, Francesco, Paula">

    <title>Game | Team Project</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="header-game" id="header-game" role="banner">
            <div>Time: <span id="timer">0</span>s</div>

            <div id="lives-container">
                <span id="heart1"><img src="assets/heart.svg" alt="Life" width="24" height="24"></span>
                <span id="heart2"><img src="assets/heart.svg" alt="Life" width="24" height="24"></span>
                <span id="heart3"><img src="assets/heart.svg" alt="Life" width="24" height="24"></span>
            </div>

            <div>Score: <span id="score">0</span></div>
        </div>

        <div class="game-container" id="game-container">
            <div id="start-menu" class="overlay-menu">
                <h1>READY TO JUMP?</h1>
                <p>Press SPACE or click START</p>
                <button id="start-btn">START</button>
            </div>

            <div id="game-over-menu" class="overlay-menu" style="display: none;">
                <h1>GAME OVER!</h1>
                <p id="final-score">Score: 0</p>
                <button id="restart-btn">TRY AGAIN</button>
            </div>

            <div id="pause-menu" class="overlay-menu" style="display: none;">
                <h1>PAUSED</h1>
                <button id="resume-btn">RESUME</button>
            </div>

            <div class="player" id="player"></div>
        </div>

        <div class="footer-game" id="footer-game">
            <div class="footer-left">
                <button id="pause-btn" aria-label="Pausa">
                    <i class="hgi hgi-stroke hgi-rounded hgi-pause"></i>
                </button>
                <button id="volume-btn" aria-label="Mute">
                    <i class="hgi hgi-stroke hgi-rounded hgi-volume-high"></i>
                </button>
            </div>

            <a href="https://github.com/francescoGemolo/JS-Game" target="_blank" rel="noopener noreferrer"
                aria-label="Repository GitHub">
                <i class="hgi hgi-stroke hgi-rounded hgi-github"></i>
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
